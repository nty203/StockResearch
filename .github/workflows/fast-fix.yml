name: Fast Fix PPTR

on:
  workflow_dispatch:

jobs:
  fast-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/collector
    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_DB_URL:      ${{ secrets.SUPABASE_DB_URL }}
      DART_API_KEY:         ${{ secrets.DART_API_KEY }}
      TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push DB Migrations
        run: supabase db push --db-url ${{ secrets.SUPABASE_DB_URL }}

      - name: Run analyze library PPTR
        run: uv run python -m src.hundredx.analyze_library_pptr

      - name: Run scanner
        run: uv run python -m src.hundredx.scanner
