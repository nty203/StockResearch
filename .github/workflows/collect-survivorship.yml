name: Survivorship-Free Universe Builder

# 월 1회 실행 — KRX 상장폐지 종목 포함 학습 데이터 누적
# 목표: ML 모델 학습에 충분한 샘플 (목표 10,000+) 확보
on:
  schedule:
    - cron: '0 1 5 * *'   # 매월 5일 10:00 KST (UTC 01:00)
  workflow_dispatch:       # /settings 수동 실행 버튼용 — 반드시 유지

jobs:
  build-survivorship:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 상장폐지 종목 가격 데이터 백필 포함 — 최대 2시간
    defaults:
      run:
        working-directory: apps/collector
    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_DB_URL:      ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      # Step 1: 기존 학습 샘플 수 확인 (로그용)
      - name: Check existing sample count
        run: |
          uv run python - <<'EOF'
          import os
          from supabase import create_client
          url = os.environ["SUPABASE_URL"]
          key = os.environ["SUPABASE_SERVICE_KEY"]
          client = create_client(url, key)
          try:
              result = client.table("pptr_training_samples").select("id", count="exact").execute()
              count = result.count or 0
              print(f"Current training samples: {count:,}")
              print(f"Target: 10,000+")
              if count >= 10_000:
                  print("INFO: Already have sufficient samples for ML training")
              else:
                  print(f"INFO: Need {10_000 - count:,} more samples")
          except Exception as e:
              print(f"WARNING: Could not check sample count: {e}")
          EOF

      # Step 2: Survivorship-free universe 빌드 (상장폐지 + 현재 종목)
      - name: Build survivorship-free universe
        run: |
          uv run python - <<'EOF'
          import os
          from supabase import create_client
          from src.hundredx.data.survivorship_free import build_survivorship_free_universe

          url = os.environ["SUPABASE_URL"]
          key = os.environ["SUPABASE_SERVICE_KEY"]
          client = create_client(url, key)

          print("Starting survivorship-free universe build...")
          stats = build_survivorship_free_universe(
              client=client,
              max_tickers=500,          # 월 1회 500종목씩 누적
          )
          print(f"Processed: {stats.total_tickers:,} tickers")
          print(f"Active: {stats.active_tickers:,} tickers")
          print(f"Delisted: {stats.delisted_tickers:,} tickers")
          print(f"Winners (10x+): {stats.winners_10x:,}")
          print(f"Losers: {stats.losers:,}")
          print(f"Samples generated: {stats.samples_generated:,}")
          print(f"Errors: {stats.errors:,}")
          EOF

      # Step 3: 현재 학습 샘플 통계 출력
      - name: Print training data statistics
        run: |
          uv run python - <<'EOF'
          import os
          from supabase import create_client
          url = os.environ["SUPABASE_URL"]
          key = os.environ["SUPABASE_SERVICE_KEY"]
          client = create_client(url, key)
          try:
              # Split별 분포 (date ranges)
              SPLITS = {
                  "train": ("2000-01-01", "2018-12-31"),
                  "val":   ("2019-07-01", "2022-12-31"),
                  "test":  ("2023-07-01", "2099-12-31"),
              }
              for split, (start, end) in SPLITS.items():
                  r = (client.table("pptr_training_samples")
                       .select("id", count="exact")
                       .gte("snapshot_date", start)
                       .lte("snapshot_date", end)
                       .execute())
                  print(f"  {split:12s}: {r.count or 0:>6,} samples")

              # 라벨 분포
              r = (client.table("pptr_training_samples")
                   .select("id", count="exact")
                   .eq("label_10x_24m", 1)
                   .execute())
              positives = r.count or 0
              r_total = client.table("pptr_training_samples").select("id", count="exact").execute()
              total = r_total.count or 0
              if total > 0:
                  print(f"\n  10x_24m positive rate: {positives/total:.1%} ({positives:,}/{total:,})")
          except Exception as e:
              print(f"WARNING: Stats failed: {e}")
          EOF
