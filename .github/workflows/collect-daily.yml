name: Daily Collector

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 06:00 KST (UTC 21:00)
  workflow_dispatch:         # /settings 페이지 수동 재실행 버튼용 — 반드시 유지

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/collector
    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_DB_URL:      ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      # 유니버스 — 종목 메타데이터 (stocks 테이블), 다른 수집기의 전제조건
      - name: Run universe
        run: uv run python -m src.universe

      # 가격은 하루 1회 — 장 마감 후 전일 종가 upsert
      - name: Run prices
        run: uv run python -m src.prices

      - name: Run financials (DART + SEC)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: uv run python -m src.financials_dart

      - name: Run screening scores
        run: uv run python -m src.screening.score

      - name: Run enqueue
        run: uv run python -m src.queue.enqueue
