name: Daily Collector

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 06:00 KST (UTC 21:00)
  workflow_dispatch:         # /settings 페이지 수동 재실행 버튼용 — 반드시 유지

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 90     # 초기 실행: 신규 KOSDAQ ~1,700종목 2년 가격 백필 포함
    defaults:
      run:
        working-directory: apps/collector
    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_DB_URL:      ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      # 유니버스 — 종목 메타데이터 (stocks 테이블), 다른 수집기의 전제조건
      - name: Run universe
        run: uv run python -m src.universe

      # 가격은 하루 1회 — 장 마감 후 전일 종가 upsert
      - name: Run prices
        run: uv run python -m src.prices

      # 상폐/거래정지 종목 자동 감지 — prices 직후 실행해야 최신 가격으로 판정 가능
      - name: Prune delisted/halted stocks
        run: uv run python -m src.utils.prune_delisted
