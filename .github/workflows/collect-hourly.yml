name: Hourly Collector

on:
  schedule:
    - cron: '0 * * * *'   # 매시간
  workflow_dispatch:        # /settings 페이지 수동 재실행 버튼용 — 반드시 유지

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/collector
    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_DB_URL:      ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      # prices는 하루 1회로 충분 (주가는 일봉 데이터) — daily 워크플로우에서 실행
      - name: Run filings watcher
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: uv run python -m src.filings_watch

      - name: Run news RSS
        run: uv run python -m src.news_rss

      - name: Run trigger classifier
        run: uv run python -m src.triggers.golden_signal
