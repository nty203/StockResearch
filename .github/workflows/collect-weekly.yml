name: Weekly Library Update & Prune

on:
  schedule:
    - cron: '0 13 * * 0'   # Sunday 22:00 KST
  workflow_dispatch:

jobs:
  update-then-prune:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: apps/collector
    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_DB_URL:      ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run financials (DART)
        continue-on-error: true
        timeout-minutes: 25
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: uv run python -m src.financials_dart

      - name: Update hundredx library multipliers
        run: uv run python -m src.hundredx.update_library

      - name: Evaluate PPTR rule performance
        run: uv run python -m src.hundredx.pptr_performance

      - name: Prune old prices (> 2 years)
        run: uv run python -m src.utils.prune_prices
