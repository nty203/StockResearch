name: Daily Macro News + Themes

on:
  schedule:
    - cron: '0 21 * * *'   # 오전 6시 KST — macro-idea 루틴 실행 1시간 전 데이터 준비
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/collector
    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_DB_URL:      ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen

      - name: Collect macro news (더일렉·Bloomberg·AI타임스 포함)
        continue-on-error: true
        run: uv run python -m src.macro_news

      - name: Update macro theme rankings
        continue-on-error: true
        run: uv run python -m src.macro_themes
